name: Node.js Test CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  Build-Test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run Build
        run: npm run build

      - name: Run Tests
        run: npm run test
